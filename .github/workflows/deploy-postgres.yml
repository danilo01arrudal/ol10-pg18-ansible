name: Deploy PostgreSQL via Ansible

on:
  push:
    branches:
	- main  # O workflow será acionado quando você fizer um push na branch main

jobs:
  ansible-job:
    runs-on: self-hosted  # Isso direciona o job para a sua máquina dedicada
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Executar o Playbook do Ansible
        run: |
          # Garanta que o caminho do seu playbook esteja correto
          ansible-playbook playbooks/site.yml
